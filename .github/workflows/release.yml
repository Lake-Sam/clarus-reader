name: Windows release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Build installers and draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__
          releaseName: Clarus Reader v__VERSION__
          releaseBody: See the assets below to install Clarus Reader on Windows.
          releaseDraft: true
          prerelease: false
